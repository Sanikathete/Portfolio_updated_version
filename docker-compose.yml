version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: stocksphere_db
      POSTGRES_USER: stocksphere_user
      POSTGRES_PASSWORD: stocksphere@123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  django:
    build:
      context: .
      dockerfile: backend-django/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DEBUG=True
      - DB_HOST=db
      - DB_NAME=stocksphere_db
      - DB_USER=stocksphere_user
      - DB_PASSWORD=stocksphere@123
      - DB_PORT=5432

volumes:
  postgres_data:
